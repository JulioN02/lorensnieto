name: Bug Report
description: Reportar un bug en el sistema
title: "[BUG] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Descripción del Bug
        Describe el problema claramente.

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      description: Cómo reproducimos el bug paso a paso
      placeholder: |
        1. Voy a...
        2. Hago clic en...
        3. Veo...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
      description: Qué debería pasar
      placeholder: Debería...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamiento actual
      description: Qué pasa actualmente
      placeholder: Pero pasa...
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Capturas de pantalla
      description: Si aplica, agrega capturas
      placeholder: |
        ```
        [Arrastra o pega imágenes aquí]
        ```

  - type: dropdown
    id: priority
    attributes:
      label: Prioridad
      options:
        - Alta
        - Media
        - Baja
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Información adicional
      description: Navegador, sistema operativo, etc.
      placeholder: |
        - Navegador:
        - Sistema operativo:
        - Versión del sistema:
