name: Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Build TypeScript
        run: npm run build
        working-directory: backend

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 7

  build-frontend-admin:
    name: Build Frontend Admin
    runs-on: ubuntu-latest
    needs: build-backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend-admin

      - name: Build
        run: npm run build
        working-directory: frontend-admin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-admin-dist
          path: frontend-admin/dist
          retention-days: 7

  build-frontend-public:
    name: Build Frontend Público
    runs-on: ubuntu-latest
    needs: build-backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload frontend public
        uses: actions/upload-artifact@v4
        with:
          name: frontend-public
          path: frontend-public
          retention-days: 7

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend-admin, build-frontend-public]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            backend/dist/**/*
            frontend-admin/dist/**/*
            frontend-public/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
